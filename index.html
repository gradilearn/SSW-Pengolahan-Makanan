<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WELCOME</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* =========================
   MENU TOGGLE
========================= */

.menu-toggle{
    position:fixed;
    top:20px;
    right:20px;
    left:auto;

    width:50px;
    height:50px;

    background:#ff4d6d;
    color:white;

    font-size:28px;

    display:flex;
    justify-content:center;
    align-items:center;

    border-radius:12px;

    cursor:pointer;

    z-index:1001;

    box-shadow:0 4px 10px rgba(0,0,0,0.2);

    transition:0.3s;
}

.menu-toggle:hover{
    transform:scale(1.05);
}

/* =========================
   DROPDOWN MENU
========================= */

.dropdown-menu{
    position:fixed;

    top:80px;
    right:20px;
    left:auto;

    width:240px;

    background:white;

    border-radius:15px;

    box-shadow:0 5px 15px rgba(0,0,0,0.15);

    padding:15px;

    display:none;

    flex-direction:column;

    gap:12px;

    z-index:99999;

    overflow:hidden;
}

/* SAAT MENU AKTIF */

.dropdown-menu.active{
    display:flex;
}

/* LINK MENU */

.dropdown-menu a{
    text-decoration:none;

    color:#333;

    background:#f5f5f5;

    padding:14px;

    border-radius:12px;

    font-size:17px;

    transition:0.3s;
}

.dropdown-menu a:hover{
    background:#ff4d6d;
    color:white;

    transform:translateX(5px);
}
body{
    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    overflow:hidden;

    font-family:'Segoe UI', sans-serif;

    /* BACKGROUND PINK + BLUE */
    background: linear-gradient(
        135deg,
        #ffc0d9,
        #d8c7ff,
        #9fd6ff
    );

    position:relative;
}

/* EFEK BULAT BLUR */
body::before{
    content:"";
    position:absolute;

    width:500px;
    height:500px;

    background:rgba(255,255,255,0.25);

    border-radius:50%;

    filter:blur(120px);

    top:-120px;
    left:-120px;

    animation: floatGlow 6s ease-in-out infinite;
}

@keyframes floatGlow{
    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(20px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* CONTAINER */
.center-box{
    text-align:center;
    z-index:2;

    animation: fadeIn 2s ease;
}

/* WELCOME */
.center-box h1{

    font-size:120px;

    color:#ffffff;

    letter-spacing:8px;

    font-weight:bold;

    /* BAYANGAN AGAR LEBIH TERLIHAT */
    text-shadow:
    0 0 8px rgba(255,255,255,0.9),
    0 0 20px rgba(255,105,180,0.9),
    0 0 35px rgba(0,0,0,0.25);

    margin-bottom:20px;

    animation: pulse 3s infinite;
}

/* TULISAN JEPANG */
.center-box p{

    font-size:30px;

    color:#ffffff;

    font-weight:600;

    letter-spacing:3px;

    /* SHADOW TAMBAHAN */
    text-shadow:
    0 0 8px rgba(255,255,255,0.8),
    0 0 20px rgba(0,0,0,0.25);

    opacity:1;

    animation: slideUp 2s ease;
}

/* FOOTER */
.footer{

    position:absolute;

    bottom:20px;

    font-size:15px;

    color:#ffffff;

    font-weight:500;

    letter-spacing:2px;

    text-shadow:
    0 0 6px rgba(0,0,0,0.3);

    opacity:0.9;

    animation: fadeIn 3s ease;
}

/* ANIMASI */

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes slideUp{
    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.05);
    }

    100%{
        transform:scale(1);
    }
}

/* RESPONSIVE HP */

@media(max-width:768px){

    .center-box h1{
        font-size:55px;
        letter-spacing:4px;
    }

    .center-box p{
        font-size:20px;
    }

    .footer{
        font-size:12px;
    }

}

</style>
</head>
